<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Stats</title>
</head>
<body>
    <div class="container">
        <div class="header">Your Stats</div>

        <div class="card">
            <p>Total Water Intake: <span id="total-intake">0</span> ml</p>
            <button id="reset-btn">Reset</button>
        </div>

        <div class="footer">
            <a href="index.html"><button id="home-btn">Home</button></a>
            <a href="stats.html"><button id="stats-btn">Stats</button></a>
        </div>
    </div>

    <script>
        // Get the total water intake from localStorage and display it
        const totalIntakeElement = document.getElementById('total-intake');
        const resetBtn = document.getElementById('reset-btn');

        // Function to update the total intake display
        const updateTotalIntake = () => {
            const totalIntake = localStorage.getItem('waterIntake') || 0; // Get current intake or default to 0
            totalIntakeElement.textContent = totalIntake; // Update the display
        }

        // Initial update
        updateTotalIntake();

        // Reset button functionality
        resetBtn.addEventListener('click', () => {
            localStorage.removeItem('waterIntake'); // Remove the water intake from localStorage
            updateTotalIntake(); // Update the display
        });
    </script>
</body>
</html>
